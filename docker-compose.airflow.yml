services:

  airflow-init:
    image: apache/airflow:2.10.5
    container_name: airflow-init

    user: "${AIRFLOW_UID}:0"

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:root@pgdatabase:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./sql:/opt/airflow/sql

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "

    restart: "no"

    networks:
      - iot-sensor-data-pipeline_default



  airflow-webserver:
    image: apache/airflow:2.10.5
    container_name: airflow-webserver

    user: "${AIRFLOW_UID}:0"

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:root@pgdatabase:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql

    ports:
      - "8080:8080"

    command: webserver

    restart: unless-stopped

    networks:
      - iot-sensor-data-pipeline_default



  airflow-scheduler:
    image: apache/airflow:2.10.5
    container_name: airflow-scheduler

    user: "${AIRFLOW_UID}:0"

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:root@pgdatabase:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql

    command: scheduler

    restart: unless-stopped

    networks:
      - iot-sensor-data-pipeline_default



networks:
  iot-sensor-data-pipeline_default:
    external: true