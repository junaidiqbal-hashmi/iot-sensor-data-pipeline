services:

  pgdatabase:
    image: postgres:18
    container_name: pgdatabase

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: sensor

    volumes:
      - sensor_postgres_data:/var/lib/postgresql

    ports:
      - "5432:5432"

    restart: unless-stopped


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    ports:
      - "8085:80"

    depends_on:
      - pgdatabase

    restart: unless-stopped


  airflow-init:
    image: apache/airflow:2.10.5
    container_name: airflow-init

    user: "${AIRFLOW_UID}:0"

    depends_on:
      - pgdatabase

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:root@pgdatabase:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "

    restart: "no"


  airflow-webserver:
    image: apache/airflow:2.10.5
    container_name: airflow-webserver

    user: "${AIRFLOW_UID}:0"

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:root@pgdatabase:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql

    ports:
      - "8080:8080"

    command: webserver

    restart: unless-stopped


  airflow-scheduler:
    image: apache/airflow:2.10.5
    container_name: airflow-scheduler

    user: "${AIRFLOW_UID}:0"

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:root@pgdatabase:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql

    command: scheduler

    restart: unless-stopped


volumes:
  sensor_postgres_data:
  pgadmin_data: